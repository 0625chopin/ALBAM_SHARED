name: db-types-drift

# 원격 Supabase 스키마와 src/database.ts(DB 타입 단일 소스)의 드리프트 감시.
# 감시·알림만 수행(자동 커밋/발행 없음). 반영은 SYNCING.md 절차대로 사람이 한다.
# 필요 시크릿: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID

on:
  schedule:
    - cron: "0 0 * * 1" # 매주 월요일 00:00 UTC
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Supabase CLI 설치
        run: npm i -g supabase

      - name: 원격 타입 재생성 → 임시 파일
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase gen types typescript \
            --project-id "${{ secrets.SUPABASE_PROJECT_ID }}" \
            > /tmp/database.remote.ts

      - name: src/database.ts 와 diff (차이 시 실패)
        run: |
          if ! diff -q src/database.ts /tmp/database.remote.ts > /dev/null; then
            echo "::error::DB 타입 드리프트 감지 — SYNCING.md 절차로 src/database.ts 갱신·발행 필요"
            diff src/database.ts /tmp/database.remote.ts || true
            exit 1
          fi
          echo "드리프트 없음 — src/database.ts 가 원격 스키마와 일치"
